name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-check:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Explain release policy
        run: |
          echo "This public repository publishes source code and manually verified test DMGs."
          echo "Developer ID signing/notarization is intentionally not run in public CI unless signing secrets are configured in a separate private workflow."

      - name: Verify source package pins
        run: xcodebuild -resolvePackageDependencies -disableAutomaticPackageResolution -project OpenClaw.xcodeproj -scheme OpenClaw

      - name: Runtime smoke test
        run: bash ./Scripts/smoke-test-runtime.sh
